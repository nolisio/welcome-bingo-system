# fly.toml app configuration file generated for welcome-bingo-system on 2026-03-23T07:01:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'welcome-bingo-system'
primary_region = 'nrt'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
