databases:
  - name: welcome-bingo-db
    databaseName: bingo
    user: bingo

services:
  - type: web
    name: welcome-bingo-server
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: welcome-bingo-db
          property: connectionString
      - key: CLIENT_URL
        value: https://welcome-bingo-client.onrender.com
      - key: ADMIN_SECRET
        sync: false

  - type: web
    name: welcome-bingo-client
    runtime: node
    rootDir: client
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SERVER_URL
        value: https://welcome-bingo-server.onrender.com
